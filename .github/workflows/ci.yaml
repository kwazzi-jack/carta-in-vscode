name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install CARTA (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository ppa:cartavis-team/carta -y
          sudo apt-get update
          sudo apt-get install carta -y

      - name: Install CARTA (macOS)
        if: runner.os == 'macOS'
        run: |
          brew tap cartavis/tap
          brew install --cask carta

      - run: npm install

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm test
